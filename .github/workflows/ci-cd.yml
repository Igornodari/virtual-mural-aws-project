name: CI — Frontend

on:
  push:
    branches:
      - develop
      - master
      - 'release/**'
  pull_request:
    branches:
      - develop
      - master

# Deploy é feito automaticamente pela Vercel via integração com GitHub
# Este workflow só valida a qualidade do código (lint, testes e build)

jobs:
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:ci
        continue-on-error: true

      - name: Build (production)
        run: npm run build -- --configuration=production
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 3
