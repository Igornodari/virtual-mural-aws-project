name: CI/CD — Frontend

on:
  push:
    branches:
      - develop
      - 'release/**'
      - main
  pull_request:
    branches:
      - develop
      - main

env:
  AWS_REGION: us-east-1
  S3_BUCKET_PROD: virtual-mural-frontend-prod
  S3_BUCKET_DEV: virtual-mural-frontend-dev
  CLOUDFRONT_DIST_ID_PROD: ${{ secrets.CLOUDFRONT_DIST_ID_PROD }}
  CLOUDFRONT_DIST_ID_DEV: ${{ secrets.CLOUDFRONT_DIST_ID_DEV }}

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — Lint + Testes + Build (toda branch/PR)
  # ─────────────────────────────────────────
  lint-test-build:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint -- --max-warnings=0

      - name: Unit tests (Vitest)
        run: npm run test -- --run --reporter=verbose

      - name: Build (production)
        run: npm run build -- --configuration=production
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  # ─────────────────────────────────────────
  # JOB 2 — Deploy S3 develop (branch develop)
  # ─────────────────────────────────────────
  deploy-dev:
    name: Deploy to S3 (dev)
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 (dev)
        run: |
          aws s3 sync dist/aws-frontend/browser/ s3://${{ env.S3_BUCKET_DEV }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"
          aws s3 cp dist/aws-frontend/browser/index.html s3://${{ env.S3_BUCKET_DEV }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache (dev)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DIST_ID_DEV }} \
            --paths "/*"

  # ─────────────────────────────────────────
  # JOB 3 — Deploy S3 produção (apenas main)
  # ─────────────────────────────────────────
  deploy-prod:
    name: Deploy to S3 (production)
    runs-on: ubuntu-latest
    needs: lint-test-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync to S3 (prod) — assets com cache longo
        run: |
          aws s3 sync dist/aws-frontend/browser/ s3://${{ env.S3_BUCKET_PROD }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html"

      - name: Upload index.html sem cache (prod)
        run: |
          aws s3 cp dist/aws-frontend/browser/index.html s3://${{ env.S3_BUCKET_PROD }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache (prod)
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ env.CLOUDFRONT_DIST_ID_PROD }} \
            --paths "/*"
