<nav class="bottom-nav" role="navigation">
  <a class="bottom-nav__item" [routerLink]="customerLink" routerLinkActive="bottom-nav__item--active"
    [routerLinkActiveOptions]="{ exact: false }" matRipple [matRippleColor]="'rgba(0,0,0,0.05)'">
    <div class="bottom-nav__pill">
      <mat-icon>explore</mat-icon>
    </div>

    <span class="bottom-nav__label">
      {{ 'EXPLORE' | translate }}
    </span>
  </a>

  <a class="bottom-nav__item" [routerLink]="appointmentsLink" routerLinkActive="bottom-nav__item--active"
    [routerLinkActiveOptions]="{ exact: false }" matRipple [matRippleColor]="'rgba(0,0,0,0.05)'">
    <div class="bottom-nav__pill">
      <mat-icon>calendar_month</mat-icon>
    </div>

    <span class="bottom-nav__label">
      {{ 'APPOINTMENTS' | translate }}
    </span>
  </a>

  <!-- Item extra para quem ativou o modo prestador. -->
  @if (isProvider) {
    <a class="bottom-nav__item" [routerLink]="providerLink" routerLinkActive="bottom-nav__item--active"
      [routerLinkActiveOptions]="{ exact: false }" matRipple [matRippleColor]="'rgba(0,0,0,0.05)'">
      <div class="bottom-nav__pill">
        <mat-icon>handyman</mat-icon>
      </div>

      <span class="bottom-nav__label">
        {{ 'LAYOUT.MENU.PROVIDER_DASHBOARD_SHORT' | translate }}
      </span>
    </a>
  }

  <a class="bottom-nav__item" [routerLink]="profileLink" routerLinkActive="bottom-nav__item--active"
    [routerLinkActiveOptions]="{ exact: false }" matRipple [matRippleColor]="'rgba(0,0,0,0.05)'">
    <div class="bottom-nav__pill">
      <mat-icon>person</mat-icon>
    </div>

    <span class="bottom-nav__label">
      {{ 'LAYOUT.MENU.PROFILE' | translate }}
    </span>
  </a>
</nav>
