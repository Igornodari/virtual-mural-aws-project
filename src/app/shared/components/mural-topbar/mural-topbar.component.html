<header class="mural-topbar">
  <!-- Brand / Logo -->
  <div class="topbar-brand">
    <mat-icon class="brand-icon">campaign</mat-icon>
    <span class="brand-name">{{ 'LAYOUT.TOPBAR.BRAND' | translate }}</span>

    <!-- Toggle de modo: aparece só para quem é prestador. Mostra em
         qual papel a navegação está acontecendo e permite alternar. -->
    @if (isProvider) {
      <div class="mode-toggle" role="tablist" aria-label="{{ 'LAYOUT.TOPBAR.MODE_TOGGLE_ARIA' | translate }}">
        <button
          type="button"
          role="tab"
          class="mode-toggle__btn"
          [class.mode-toggle__btn--active]="activeMode === 'customer'"
          [attr.aria-selected]="activeMode === 'customer'"
          (click)="switchMode('customer')"
        >
          <mat-icon>explore</mat-icon>
          <span>{{ 'LAYOUT.TOPBAR.MODE_RESIDENT' | translate }}</span>
        </button>
        <button
          type="button"
          role="tab"
          class="mode-toggle__btn"
          [class.mode-toggle__btn--active]="activeMode === 'provider'"
          [attr.aria-selected]="activeMode === 'provider'"
          (click)="switchMode('provider')"
        >
          <mat-icon>handyman</mat-icon>
          <span>{{ 'LAYOUT.TOPBAR.MODE_PROVIDER' | translate }}</span>
        </button>
      </div>
    }
  </div>

  <!-- Ações -->
  <div class="topbar-actions">
    <!-- Sino de notificações: badge mostra unread count, painel mobile-first -->
    <app-notification-bell />

    <!-- Toggle de tema -->
    <button
      mat-icon-button
      (click)="themeService.toggle()"
      [matTooltip]="(themeService.isDark ? 'LAYOUT.TOPBAR.THEME_LIGHT' : 'LAYOUT.TOPBAR.THEME_DARK') | translate"
    >
      <mat-icon>{{ themeService.isDark ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <!-- Seletor de idioma — visível apenas em desktop -->
    <button mat-button [matMenuTriggerFor]="langMenu" class="lang-btn desktop-only">
      <mat-icon>language</mat-icon>
      {{ languageService.currentLabel }}
    </button>

    <mat-menu #langMenu="matMenu">
      <button mat-menu-item
        (click)="languageService.setLanguage('pt')"
        [class.active-lang]="languageService.language() === 'pt'">
        <mat-icon>check</mat-icon>
        Português
      </button>
      <button mat-menu-item
        (click)="languageService.setLanguage('en')"
        [class.active-lang]="languageService.language() === 'en'">
        <mat-icon>check</mat-icon>
        English
      </button>
    </mat-menu>

    <!-- Menu do usuário -->
    <button mat-button [matMenuTriggerFor]="userMenu" class="user-btn">
      <mat-icon>account_circle</mat-icon>
      <span class="user-name text-muted">{{ userName }}</span>
      <mat-icon>arrow_drop_down</mat-icon>
    </button>

    <mat-menu #userMenu="matMenu">
      <button mat-menu-item routerLink="/profile">
        <mat-icon>manage_accounts</mat-icon>
        {{ 'LAYOUT.TOPBAR.MY_PROFILE' | translate }}
      </button>

      <!-- Idioma dentro do menu — visível apenas em mobile -->
      <button mat-menu-item [matMenuTriggerFor]="langMenuMobile" class="mobile-only">
        <mat-icon>language</mat-icon>
        {{ 'LAYOUT.TOPBAR.LANGUAGE' | translate }}: {{ languageService.currentLabel }}
      </button>

      <mat-menu #langMenuMobile="matMenu">
        <button mat-menu-item
          (click)="languageService.setLanguage('pt')"
          [class.active-lang]="languageService.language() === 'pt'">
          <mat-icon>check</mat-icon>
          Português
        </button>
        <button mat-menu-item
          (click)="languageService.setLanguage('en')"
          [class.active-lang]="languageService.language() === 'en'">
          <mat-icon>check</mat-icon>
          English
        </button>
      </mat-menu>

      <mat-divider></mat-divider>
      <button mat-menu-item (click)="logout.emit()">
        <mat-icon>logout</mat-icon>
        {{ 'LAYOUT.TOPBAR.LOGOUT' | translate }}
      </button>
    </mat-menu>
  </div>
</header>
