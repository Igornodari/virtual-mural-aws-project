<div class="full-layout">
  <app-mural-topbar
    [isProvider]="isProvider()"
    [activeMode]="activeMode()"
    [customerLink]="customerDashboardLink"
    [providerLink]="providerDashboardLink"
    [userName]="userName()"
    (logout)="onLogout()" />

  <mat-sidenav-container class="sidenav-container">
    @if (!isMobile()) {
    <mat-sidenav mode="side" opened class="sidenav">
      <mat-nav-list>
        <a mat-list-item [routerLink]="customerDashboardLink" routerLinkActive="active-link">
          <mat-icon matListItemIcon>explore</mat-icon>
          <span matListItemTitle>{{ 'EXPLORE' | translate }}</span>
        </a>
        @if (isProvider()) {
          <a mat-list-item [routerLink]="providerDashboardLink" routerLinkActive="active-link">
            <mat-icon matListItemIcon>dashboard</mat-icon>
            <span matListItemTitle>{{ 'LAYOUT.MENU.PROVIDER_DASHBOARD' | translate }}</span>
          </a>
        }
        <a mat-list-item [routerLink]="appointmentsLink()" routerLinkActive="active-link">
          <mat-icon matListItemIcon>calendar_month</mat-icon>
          <span matListItemTitle>{{ 'APPOINTMENTS' | translate }}</span>
        </a>
        <a mat-list-item [routerLink]="profileLink()" routerLinkActive="active-link">
          <mat-icon matListItemIcon>person</mat-icon>
          <span matListItemTitle>{{ 'LAYOUT.MENU.PROFILE' | translate }}</span>
        </a>
      </mat-nav-list>
    </mat-sidenav>
    }

    <mat-sidenav-content class="content" [class.content--mobile]="isMobile()">
      <main class="main-content">
        <router-outlet></router-outlet>
      </main>
    </mat-sidenav-content>
  </mat-sidenav-container>

  @if (isMobile()) {
  <app-bottom-nav
    [isProvider]="isProvider()"
    [activeMode]="activeMode()"
    [customerLink]="customerDashboardLink"
    [providerLink]="providerDashboardLink"
    [appointmentsLink]="appointmentsLink()"
    [profileLink]="profileLink()" />
  }
</div>
